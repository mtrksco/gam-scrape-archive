name: Hourly Pulse Dashboard

on:
  schedule:
    - cron: '0 * * * *' # Hourly
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas requests lxml

      - name: Generate Dashboard HTML
        run: python hourly_pulse.py

      - name: Commit and Push Dashboard
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Update live dashboard" || exit 0
          git push
